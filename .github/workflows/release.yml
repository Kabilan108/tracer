name: Release

on:
  push:
    branches:
      - main
    paths:
      - flake.nix
  workflow_dispatch:

# Serialize release runs: concurrent version-bump pushes would race the
# release-exists check and fight over the tag ref.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # workflow_dispatch can target any ref; only main may release.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The flake builds with doCheck = false and CI is an independent
      # workflow, so the release job must gate on the checks itself.
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            printf 'The following files are not formatted:\n%s\n' "$files"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Extract version
        id: version
        run: |
          version="$(nix eval --raw .#tracer.version)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'flake version %q is not a valid X.Y.Z version\n' "$version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      # Idempotency is keyed on the RELEASE, not the tag: if a previous run
      # pushed the tag but died before creating the release, a rerun must
      # repair it rather than skip forever.
      - name: Check for existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build tracer
        if: steps.release.outputs.exists != 'true'
        run: nix build .#tracer
      - name: Verify embedded version
        if: steps.release.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          output="$(NO_COLOR=1 result/bin/tracer version)"
          expected="tracer $VERSION"
          if [[ "$output" != "$expected" ]]; then
            printf 'Version mismatch: expected %q, got %q\n' "$expected" "$output"
            exit 1
          fi
      - name: Package release
        if: steps.release.outputs.exists != 'true'
        run: |
          install -D result/bin/tracer dist/tracer-linux-amd64
          (cd dist && sha256sum * > SHA256SUMS)
      # gh creates the tag at --target atomically when it is absent, and
      # reuses an existing tag otherwise — no separate tag/push step to race.
      - name: Create GitHub release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v$VERSION" dist/* --target "$GITHUB_SHA" --generate-notes
